openapi: 3.0.0

info:
  title: Blog-Api
  version: 1.0.0
  description: API para gestionar autores y post


servers:
  - url: http://localhost:3000
    description: Desarrollo local
  - url: https://blog-api.railway.app
    description: Producción

paths:
  /api/authors:
    get:
      summary: obtener todos los autores
      tags: 
        - Autores
      responses:
        "200":
          description: Lista de autores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Author"
    post:
        summary: Crear un nuevo autor
        tags:
          - Autores
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - name
                  - email
                properties:
                  name:
                    type: string
                  email:
                    type: string
                    format: email
                  bio:
                    type: string
        responses:
          '201':
            description: Autor creado
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
          '400':
            description: Nombre y email son obligatorios
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
          '500':
            description: error al crear autor
            content: 
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
  /api/authors/{id}:
    get: 
      summary: obtener un autor por ID
      tags:
      - Autores
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Autor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Autor no encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '500':
          description: error al obtener autor
          content: 
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    put:
      summary:  Actualizar autor
      tags:
        - Autores
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                bio:
                  type: string
      responses:
        '200':
          description: Autor actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          description: Nombre y email son obligatorios
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Autor no encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '500':
          description: error al actualizar autor
          content: 
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    delete:
      summary:  Eliminar autor
      tags:
        - Autores
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Autor eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Autor no encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '500':
          description: error al eliminar autor
          content: 
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string                
  /api/posts:
    get:
      summary: obtener todos los posts
      tags: 
        - Posts
      responses:
        "200":
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
        summary: Crear un nuevo post
        tags:
          - Posts
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - title
                  - content
                  - author_id
                properties:
                  title:
                    type: string
                  content:
                    type: string
                  author_id:
                    type: integer
                  published:  
                    type: boolean
        responses:
          '201':
            description: Post creado correctamente
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Post"
          '400':
            description: titulo, contenido y autor_id son obligatorios
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
          '500':
            description: error al crear post
            content: 
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string

  /api/posts/{id}:
    get: 
      summary: obtener un post por ID
      tags:
      - Posts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '500':
          description: error al obtener post
          content: 
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    put:
      summary:  Actualizar Post
      tags:
        - Posts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - content
                - author_id
                - published
              properties:
                title:
                  type: string
                content:
                  type: string
                author_id:
                  type: integer
                published:  
                  type: boolean
      responses:
        '200':
          description: Post actualizado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '500':
          description: error al actualizar Post
          content: 
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
    delete:
      summary:  Eliminar Post
      tags:
        - Posts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Post eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string 
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '500':
          description: Error al eliminar post
          content: 
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string 
components:
  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
          description: ID único del autor
        name:
          type: string
          description: Nombre completo del autor
        email:
          type: string
          format: email
          description: Email del autor
        bio:
          type: string
          description: Biografía del autor
        created_at:
          type: string
          format: date-time
          description: Fecha de creación
    Post:
      type: object
      properties:
        id:
          type: integer
          description: ID único del post
        title:
          type: string
          description: Titulo del post
        content:
          type: string
          description: Contenido del post
        author_id:
          type: integer
          description: ID del autor
        published:
          type: boolean
          description: Si esta o no publicado el post
        created_at:
          type: string
          format: date-time
          description: Fecha de creación